name: CI

# Build ScrollWM and run the AX-free test suites on every push / PR.
# The hosted runner has no Accessibility grant and no display session, so we
# only run tests that are pure logic (no live AX / window spawning).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Unit tests (pure logic, no AX)
        run: |
          .build/debug/WindowLab unittest
          .build/debug/WindowLab animtest

      - name: Build (release, universal)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Smoke-test bundle assembly
        run: |
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/WindowLab"
          ./scripts/make-bundle.sh /tmp/ScrollWM.app "$BIN" "-" "$(cat VERSION)"
          codesign --verify --deep --strict /tmp/ScrollWM.app
          /tmp/ScrollWM.app/Contents/MacOS/ScrollWM help >/dev/null
          echo "bundle OK"

      - name: Updater check + staging (live, network)
        # Exercises the in-app updater's network path end-to-end against the real
        # GitHub Releases: a debug build reports as 0.0.0-dev, so it always sees
        # an update; --stage-only downloads the published .zip, verifies its
        # SHA-256 against SHA256SUMS.txt, and extracts ScrollWM.app (no install).
        # Tolerant of GitHub API hiccups so a flaky network can't redden CI.
        continue-on-error: true
        run: .build/debug/WindowLab updatecheck --stage-only

      - name: Updater swap + TCC gate self-test (offline)
        # Builds two real bundles (an ad-hoc "current" 0.1.1 and "new" 0.2.0) and
        # asserts the atomic swap + rollback work and the code-signing /
        # Accessibility-preservation gate behaves. Pure-offline; no network.
        run: |
          BIN="$(swift build --show-bin-path)/WindowLab"
          ./scripts/make-bundle.sh /tmp/cur.app  "$BIN" "-" "0.1.1"
          ./scripts/make-bundle.sh /tmp/new.app  "$BIN" "-" "0.2.0"
          .build/debug/WindowLab __update-selftest /tmp/cur.app /tmp/new.app
